<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AgentQuest</title>
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0a0c12">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #0a0c12; }
  body { font-family: 'Courier New', monospace; color: #e8dcc0; display: flex; flex-direction: column; }

  /* ---- RPG chrome ---- */
  .hud {
    display: flex; align-items: center; gap: 14px; padding: 8px 14px;
    background: linear-gradient(180deg, #1d1710, #14100a);
    border-bottom: 2px solid #6b5220; flex: 0 0 auto; z-index: 5;
  }
  .guild-title { font-weight: bold; letter-spacing: 2px; color: #ffd76a; text-shadow: 0 2px 0 #4a3208; font-size: 15px; white-space: nowrap; }
  .hud-stats { display: flex; gap: 16px; margin-left: 10px; font-size: 12px; flex-wrap: wrap; }
  .hud-stat b { color: #ffd76a; font-variant-numeric: tabular-nums; }
  .hud-spacer { margin-left: auto; }
  .rpg-btn {
    color: #d9c184; text-decoration: none; font-size: 12px; cursor: pointer;
    padding: 5px 10px; border: 1px solid #6b5220; border-radius: 6px;
    background: linear-gradient(180deg, #241c10, #191308); white-space: nowrap;
  }
  .rpg-btn:hover { color: #ffe9a8; border-color: #c9a227; }
  .rpg-btn.toggled { color: #ffe9a8; border-color: #c9a227; background: #2c2210; }

  .main { flex: 1; display: flex; min-height: 0; }
  #stage { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #06070c; min-width: 0; }
  canvas#world { image-rendering: pixelated; display: block; }

  /* quest log panel */
  #questPanel {
    width: 300px; flex: 0 0 auto; overflow-y: auto;
    background: linear-gradient(180deg, #17120a, #100d07);
    border-left: 2px solid #6b5220; padding: 10px;
  }
  #questPanel h3 { margin: 2px 0 10px; font-size: 13px; letter-spacing: 2px; color: #ffd76a; text-align: center; }
  .qrow {
    border: 1px solid #4a3a18; border-radius: 8px; padding: 8px; margin-bottom: 8px;
    background: rgba(255, 215, 106, 0.04); cursor: pointer;
  }
  .qrow:hover { border-color: #c9a227; background: rgba(255, 215, 106, 0.09); }
  .qrow.boss { border-color: #a03030; background: rgba(227, 69, 90, 0.08); }
  .qrow .qh { display: flex; align-items: center; gap: 8px; }
  .qemb { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex: 0 0 auto; border: 1px solid rgba(0,0,0,.4); }
  .qname { font-size: 12px; font-weight: bold; color: #ffe9a8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .qsub { font-size: 10px; color: #b7a476; }
  .qquest { font-size: 10.5px; color: #cbbd97; margin-top: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .qxp { height: 4px; background: #241c10; border-radius: 3px; margin-top: 6px; overflow: hidden; }
  .qxp i { display: block; height: 100%; background: linear-gradient(90deg, #c9a227, #ffd76a); }
  .qfoot { display: flex; justify-content: space-between; margin-top: 5px; font-size: 10px; }
  .qstate.fight { color: #7fdc7f; } .qstate.wait { color: #ffcf5a; } .qstate.rest { color: #8a94a8; } .qstate.boss { color: #ff8a9a; }
  .qgold { color: #ffd76a; }

  /* hero character sheet */
  #sheetOverlay { position: fixed; inset: 0; z-index: 60; background: rgba(0,0,0,.62); display: none; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
  #sheetOverlay.open { display: flex; }
  .sheet {
    width: min(580px, 94vw); max-height: 88vh; overflow-y: auto;
    background: linear-gradient(180deg, #1d1710, #120e08);
    border: 2px solid #c9a227; border-radius: 14px; padding: 16px 18px;
    box-shadow: 0 30px 80px rgba(0,0,0,.7), 0 0 40px rgba(201,162,39,.12);
  }
  .sheet-head { display: flex; gap: 12px; align-items: center; border-bottom: 1px solid #4a3a18; padding-bottom: 12px; }
  .sheet-emb { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; border: 2px solid rgba(0,0,0,.4); flex: 0 0 auto; }
  .sheet-name { font-size: 17px; font-weight: bold; color: #ffe9a8; }
  .sheet-sub { font-size: 11px; color: #b7a476; margin-top: 2px; }
  .sheet-close { margin-left: auto; background: none; border: none; color: #b7a476; font-size: 24px; cursor: pointer; font-family: inherit; }
  .sheet-close:hover { color: #ffe9a8; }
  .sheet h4 { font-size: 11px; letter-spacing: 1.5px; color: #ffd76a; margin: 14px 0 8px; text-transform: uppercase; border-bottom: 1px dashed #4a3a18; padding-bottom: 4px; }
  .sheet-xp { height: 8px; background: #241c10; border-radius: 5px; overflow: hidden; margin-top: 8px; }
  .sheet-xp i { display: block; height: 100%; background: linear-gradient(90deg, #c9a227, #ffd76a); }
  .sgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .sstat { background: rgba(255,215,106,.05); border: 1px solid #4a3a18; border-radius: 8px; padding: 7px 9px; }
  .sstat .v { font-size: 14px; font-weight: bold; color: #ffe9a8; font-variant-numeric: tabular-nums; }
  .sstat .l { font-size: 9.5px; color: #b7a476; text-transform: uppercase; letter-spacing: .4px; margin-top: 2px; }
  .squest { font-size: 12px; color: #e8dcc0; line-height: 1.5; }
  .squest .dim { color: #b7a476; font-size: 11px; }
  .slast { font-size: 11.5px; color: #cbbd97; white-space: pre-wrap; word-break: break-word; max-height: 150px; overflow-y: auto; background: rgba(0,0,0,.25); border: 1px solid #4a3a18; border-radius: 8px; padding: 8px 10px; line-height: 1.5; }
  .skillbar { display: flex; align-items: center; gap: 8px; margin: 6px 0; font-size: 11px; color: #cbbd97; }
  .skillbar .sn { width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; flex: 0 0 auto; }
  .skillbar .sb { height: 12px; border-radius: 4px; background: linear-gradient(90deg, #6b5220, #c9a227); flex: 0 0 auto; }
  .skillbar .sv { color: #ffe9a8; font-weight: bold; }
  .sheet-actions { display: flex; gap: 10px; margin-top: 16px; }
  .sheet-status { font-size: 11px; color: #b7a476; margin-top: 8px; min-height: 14px; }
  .sheet-status.ok { color: #7fdc7f; } .sheet-status.err { color: #ff8a9a; }

  /* battle log ticker */
  #ticker {
    flex: 0 0 auto; margin: 0; padding: 8px 16px 10px;
    background: linear-gradient(180deg, #1a1409, #120e06);
    border-top: 2px solid #6b5220; min-height: 74px; position: relative;
  }
  #ticker::before { content: "⚔ BATTLE LOG"; position: absolute; top: -11px; left: 14px; font-size: 10px; letter-spacing: 2px; color: #ffd76a; background: #14100a; padding: 1px 8px; border: 1px solid #6b5220; border-radius: 6px; }
  #tickerLines { font-size: 12px; line-height: 1.55; }
  #tickerLines div { opacity: .55; }
  #tickerLines div:last-child { opacity: 1; color: #ffe9a8; }
  .cursor { position: absolute; right: 14px; bottom: 8px; color: #ffd76a; animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* splash */
  #splash {
    position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px;
    background: radial-gradient(ellipse at center, #141b2e 0%, #05060a 75%);
    transition: opacity .8s; cursor: pointer;
  }
  #splash.gone { opacity: 0; pointer-events: none; }
  #splash .t1 { font-size: clamp(26px, 5vw, 52px); font-weight: bold; letter-spacing: 6px; color: #ffd76a; text-shadow: 0 3px 0 #4a3208, 0 0 30px rgba(255,215,106,.35); }
  #splash .t2 { font-size: clamp(13px, 2vw, 20px); letter-spacing: 8px; color: #cbbd97; }
  #splash .t3 { margin-top: 26px; font-size: 13px; color: #ffe9a8; animation: blink 1.1s steps(1) infinite; letter-spacing: 2px; }

  /* scanlines (retro toggle) */
  body.scanlines #stage::after {
    content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 4;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 1px, transparent 1px 3px);
  }
  @media (max-width: 900px) { #questPanel { display: none; } }
</style>
</head>
<body>
  <div class="hud">
    <div class="guild-title">⚔ AGENTQUEST</div>
    <div class="hud-stats">
      <span class="hud-stat">🪙 <b id="h-gold">0g</b></span>
      <span class="hud-stat">🔮 <b id="h-mana">0</b> mana</span>
      <span class="hud-stat">🛡 <b id="h-heroes">0</b> heroes</span>
      <span class="hud-stat">📜 <b id="h-quests">0</b> quests</span>
    </div>
    <div class="hud-spacer"></div>
    <span class="rpg-btn" id="sfxBtn" title="Toggle chiptune sound effects">🔇 SFX</span>
    <span class="rpg-btn" id="crtBtn" title="Toggle retro scanlines">📺 CRT</span>
    <a class="rpg-btn" href="/dashboard">📊 Panel</a>
    <a class="rpg-btn" href="/history">📈 History</a>
  </div>

  <div class="main">
    <div id="stage"><canvas id="world"></canvas></div>
    <div id="questPanel"><h3>— QUEST LOG —</h3><div id="questList"></div></div>
  </div>

  <div id="ticker"><div id="tickerLines"></div><span class="cursor">▼</span></div>

  <div id="sheetOverlay"><div class="sheet" id="sheetBody"></div></div>

  <div id="splash"><div class="t1">⚔ AGENTQUEST ⚔</div><div class="t2">YOUR AGENTS · THEIR LEGEND</div><div class="t3">▶ PRESS TO BEGIN</div></div>

<script>
'use strict';
// ============================================================================
// AgentQuest — a JRPG visualization of live Claude Code sessions.
// Sessions are heroes; workspaces form PARTIES that battle a shared monster;
// the biggest hoard of tokens spawns a WORLD BOSS. Tool events land as
// attacks in the battle log; finishing a quest triggers a victory fanfare;
// heroes earn visible gear as they level. Zero dependencies.
// ============================================================================

// ---------- tiny helpers ----------
function mulberry32(a) { return function() { a |= 0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const dist = (a, b, c, d) => Math.hypot(c - a, d - b);
const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
function fmt(n) { n = +n || 0; if (n >= 1e9) return (n/1e9).toFixed(1)+'B'; if (n >= 1e6) return (n/1e6).toFixed(1)+'M'; if (n >= 1e3) return (n/1e3).toFixed(1)+'k'; return String(Math.round(n)); }
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function shade(hex, f) { // lighten (f>0) or darken (f<0) a #rrggbb color
  const m = /^#?([0-9a-f]{6})$/i.exec(hex || ''); if (!m) return hex || '#888';
  const n = parseInt(m[1], 16);
  const ch = (v) => clamp(Math.round(v + (f > 0 ? (255 - v) * f : v * f)), 0, 255);
  return '#' + [(n >> 16) & 255, (n >> 8) & 255, n & 255].map(ch).map(v => v.toString(16).padStart(2, '0')).join('');
}

// ---------- chiptune SFX (opt-in, WebAudio) ----------
const SFX = (() => {
  let ctx = null;
  let enabled = localStorage.getItem('aihq-sfx') === '1';
  function ensure() { if (!ctx) { try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch {} } if (ctx && ctx.state === 'suspended') ctx.resume().catch(() => {}); }
  function tone(f, d, type, g, delay) {
    if (!enabled || !ctx) return;
    try {
      const o = ctx.createOscillator(), ga = ctx.createGain();
      o.type = type || 'square'; o.frequency.value = f;
      o.connect(ga); ga.connect(ctx.destination);
      const t = ctx.currentTime + (delay || 0);
      ga.gain.setValueAtTime(0.0001, t);
      ga.gain.exponentialRampToValueAtTime(g || 0.05, t + 0.012);
      ga.gain.exponentialRampToValueAtTime(0.0001, t + d);
      o.start(t); o.stop(t + d + 0.03);
    } catch {}
  }
  return {
    get on() { return enabled; },
    toggle() { enabled = !enabled; localStorage.setItem('aihq-sfx', enabled ? '1' : '0'); if (enabled) { ensure(); tone(660, 0.08, 'square', 0.05); } return enabled; },
    ensure,
    attack(crit) { if (crit) { tone(660, 0.06, 'square', 0.06); tone(880, 0.09, 'square', 0.06, 0.05); } else { tone(210, 0.05, 'square', 0.045); tone(165, 0.05, 'square', 0.04, 0.03); } },
    magic() { tone(520, 0.06, 'triangle', 0.05); tone(780, 0.08, 'triangle', 0.05, 0.05); },
    miss() { tone(150, 0.1, 'sine', 0.05); tone(110, 0.1, 'sine', 0.04, 0.08); },
    hurt() { tone(110, 0.09, 'sawtooth', 0.045); },
    fanfare() { [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.13, 'square', 0.065, i * 0.13)); tone(1319, 0.34, 'square', 0.055, 0.55); },
    levelup() { [392, 523, 659, 784, 1047].forEach((f, i) => tone(f, 0.09, 'triangle', 0.06, i * 0.075)); },
    alert() { tone(880, 0.12, 'sine', 0.055); tone(660, 0.14, 'sine', 0.055, 0.16); },
    boss() { tone(98, 0.35, 'sawtooth', 0.07); tone(82, 0.45, 'sawtooth', 0.07, 0.3); tone(65, 0.6, 'sawtooth', 0.06, 0.62); },
  };
})();
window.addEventListener('pointerdown', () => SFX.ensure(), { once: true });

// ---------- world constants ----------
const TILE = 32, MAPW = 48, MAPH = 27;
const WORLD_W = MAPW * TILE, WORLD_H = MAPH * TILE;
const T = { GRASS: 0, PATH: 1, WATER: 2, FLOOR: 3, WALL: 4, ROOF: 5, CLEAR: 6 };

// classes: role -> RPG class
function classOf(role) {
  const r = (role || '').toLowerCase();
  if (r.includes('front')) return { key: 'ranger',    title: 'Ranger',    icon: '🏹', armor: '#3f7d3f', trim: '#2c5a2c' };
  if (r.includes('back'))  return { key: 'paladin',   title: 'Paladin',   icon: '🛡', armor: '#b9a44c', trim: '#8a7526' };
  if (r.includes('data engineer')) return { key: 'wizard', title: 'Wizard', icon: '🔮', armor: '#4a4aa8', trim: '#32327a' };
  if (r.includes('analyst')) return { key: 'sage',    title: 'Sage',      icon: '📜', armor: '#7a6a9a', trim: '#584a74' };
  if (r.includes('devops')) return { key: 'artificer', title: 'Artificer', icon: '⚒', armor: '#8a5a2a', trim: '#63401c' };
  if (r.includes('qa'))    return { key: 'rogue',     title: 'Rogue',     icon: '🗡', armor: '#3c3c46', trim: '#26262e' };
  if (r.includes('full'))  return { key: 'dragoon',   title: 'Dragoon',   icon: '🐉', armor: '#2e6d6d', trim: '#1e4d4d' };
  if (r.includes('architect')) return { key: 'archmage', title: 'Archmage', icon: '👑', armor: '#6a2ea0', trim: '#4a1e73' };
  if (r.includes('writer')) return { key: 'bard',     title: 'Bard',      icon: '✒', armor: '#a04a6a', trim: '#733048' };
  return { key: 'knight', title: 'Knight', icon: '⚔', armor: '#9aa4b4', trim: '#6b7484' };
}
function levelOf(tokens) { return clamp(Math.floor(Math.pow((tokens || 0) / 1e4, 0.35)) + 1, 1, 99); }
function xpProgress(tokens) {
  const lvl = levelOf(tokens);
  const at = l => Math.pow(l - 1, 1 / 0.35) * 1e4;
  const lo = at(lvl), hi = at(lvl + 1);
  return clamp(((tokens || 0) - lo) / Math.max(1, hi - lo), 0, 1);
}
const MONSTER_ADJ = {
  slime:  ['Sticky', 'Mildly Annoying', 'Gooey', 'Off-By-One'],
  goblin: ['Sneaky', 'Untested', 'Deprecated', 'Flaky'],
  golem:  ['Legacy', 'Monolithic', 'Stubborn', 'Tech-Debt'],
  dragon: ['Dreaded', 'Ancient', 'Token-Hoarding', 'Undocumented'],
};
function monsterTier(tokens) {
  if (tokens < 1e6)  return { kind: 'slime',  label: 'Slime',  hp: 900 };
  if (tokens < 15e6) return { kind: 'goblin', label: 'Goblin', hp: 2600 };
  if (tokens < 6e7)  return { kind: 'golem',  label: 'Golem',  hp: 7000 };
  return { kind: 'dragon', label: 'Dragon', hp: 16000 };
}
function projName(s) { return s.title || ((s.cwd || '').split(/[\\/]/).filter(Boolean).pop()) || 'the Unknown'; }
function wkeyOf(s) { return [(s.host || ''), (s.ide || ''), (s.cwd || '').toLowerCase()].join('|'); }

// ---------- map layout ----------
const grid = [];
const deco = [];
const rng = mulberry32(20260722);
for (let y = 0; y < MAPH; y++) { grid[y] = []; for (let x = 0; x < MAPW; x++) grid[y][x] = T.GRASS; }

// guild hall
for (let x = 1; x <= 17; x++) for (let y = 0; y <= 1; y++) grid[y][x] = T.ROOF;
for (let x = 2; x <= 16; x++) grid[2][x] = T.WALL;
for (let y = 3; y <= 8; y++) for (let x = 2; x <= 16; x++) grid[y][x] = (x === 2 || x === 16) ? T.WALL : T.FLOOR;
for (let x = 2; x <= 16; x++) grid[9][x] = (x === 9 || x === 10) ? T.FLOOR : T.WALL;

// paths
for (let y = 10; y <= 13; y++) { grid[y][9] = T.PATH; grid[y][10] = T.PATH; }
for (let x = 9; x <= 45; x++) grid[13][x] = T.PATH;

// battle sites
const SITES = [
  { x: 22, y: 7 }, { x: 30, y: 5 }, { x: 38, y: 8 }, { x: 44, y: 5 },
  { x: 21, y: 19 }, { x: 29, y: 21 }, { x: 37, y: 18 }, { x: 44, y: 21 },
];
for (const s of SITES) {
  for (let dy = -1; dy <= 1; dy++) for (let dx = -2; dx <= 2; dx++) {
    const gx = s.x + dx, gy = s.y + dy;
    if (gy >= 0 && gy < MAPH && gx >= 0 && gx < MAPW) grid[gy][gx] = T.CLEAR;
  }
  const dir = s.y < 13 ? -1 : 1;
  for (let y = 13 + dir; dir < 0 ? y >= s.y + 2 : y <= s.y - 2; y += dir) if (grid[y] && grid[y][s.x] === T.GRASS) grid[y][s.x] = T.PATH;
  deco.push({ t: 'torch', x: s.x - 2.2, y: s.y - 1.4 }, { t: 'torch', x: s.x + 2.2, y: s.y - 1.4 });
}

// pond
for (let y = 19; y <= 24; y++) for (let x = 3; x <= 9; x++) {
  const edge = (y === 19 || y === 24) && (x === 3 || x === 9);
  if (!edge) grid[y][x] = T.WATER;
}

// furniture + set dressing
deco.push({ t: 'fire', x: 7, y: 6.2 });
deco.push({ t: 'board', x: 12.6, y: 10.6 });
deco.push({ t: 'barrel', x: 3.4, y: 3.9 }, { t: 'barrel', x: 4.2, y: 3.9 }, { t: 'barrel', x: 15.5, y: 3.9 });
const REST_SPOTS = [[4,5],[6,5],[8,5],[10,5],[12,5],[4,7.4],[6,7.4],[12,7.4],[14,5],[14,7.4]];
for (const [sx, sy] of REST_SPOTS) deco.push({ t: 'stool', x: sx, y: sy + 0.45 });
const BOARD_SPOTS = [[12,12],[13.4,12],[14.8,12],[11.2,12.8],[16,12.8],[13,13.6]];
const DUMMY_SPOTS = [[19,16],[21.5,16],[24,16],[26.5,16]];
for (const [dx, dy] of DUMMY_SPOTS) deco.push({ t: 'dummy', x: dx + 1.1, y: dy });

function freeGrass(x, y) {
  if (grid[y][x] !== T.GRASS) return false;
  for (const s of SITES) if (Math.abs(x - s.x) < 4 && Math.abs(y - s.y) < 3) return false;
  if (y >= 10 && y <= 14 && x >= 8) return false;
  if (x >= 10 && x <= 18 && y >= 10 && y <= 14) return false;
  if (x >= 18 && x <= 28 && y >= 15 && y <= 17) return false;
  return true;
}
for (let y = 0; y < MAPH; y++) for (let x = 0; x < MAPW; x++) {
  if (!freeGrass(x, y)) continue;
  const border = x < 1 || x > MAPW - 2 || y > MAPH - 2 || (y < 1 && x > 18);
  const r = rng();
  if (border && r < 0.72) deco.push({ t: 'tree', x: x + 0.5, y: y + 0.9 });
  else if (r < 0.045) deco.push({ t: 'tree', x: x + 0.5, y: y + 0.9 });
  else if (r < 0.075) deco.push({ t: 'rock', x: x + 0.5, y: y + 0.75 });
  else if (r < 0.135) deco.push({ t: 'flower', x: x + 0.5, y: y + 0.6 });
}
deco.sort((a, b) => a.y - b.y);

// ---------- static map painting ----------
const base = document.createElement('canvas');
base.width = WORLD_W; base.height = WORLD_H;
const bctx = base.getContext('2d');
const trng = mulberry32(77);
function paintTile(c, x, y, t) {
  const px0 = x * TILE, py0 = y * TILE;
  if (t === T.GRASS || t === T.CLEAR) {
    c.fillStyle = t === T.CLEAR ? '#7d6748' : ((x + y) % 2 ? '#3e8948' : '#3a8143');
    c.fillRect(px0, py0, TILE, TILE);
    for (let i = 0; i < 4; i++) {
      const rx = px0 + trng() * 28, ry = py0 + trng() * 28;

// hero. o: {cls,color,lvl,walk,t,attackT,kneel,pose,facing}
function paintHero(c, hx, hy, o) {
  c.save(); c.translate(hx, hy); if (o.facing < 0) c.scale(-1, 1);
  const A = o.cls.armor, TR = o.cls.trim, skin = '#e8b88a', hair = o.color || '#444';
  const lvl = o.lvl || 1;

  const step = o.walk ? Math.round(Math.sin(o.t / 110)) : 0;
  const hop = o.pose === 'victory' ? Math.abs(Math.sin(o.t / 140)) * 4 : 0;
  const kneel = o.kneel ? 3 : 0;
  const oy = kneel * S - hop;
  c.fillStyle = 'rgba(0,0,0,0.28)'; c.beginPath(); c.ellipse(0, 2, 8 * S / 2 + 3, 3.4, 0, 0, 7); c.fill();
  const g = (x, y, w, h, col) => px(c, 0, oy, x, y, w, h, col);
  // cape at Lv.10+ (flutters)
  if (lvl >= 10) {
    const fl = Math.sin(o.t / 200) * 0.8;
    g(-6.4 - fl, -10.6, 2.6 + fl, 8, shade(o.color, -0.25));
    g(-5.4 - fl * 0.5, -3.2, 1.8, 1.6, shade(o.color, -0.4));
  }
  // legs
  if (o.kneel) { g(-3, -3, 3, 3, TR); g(0.5, -2, 3, 2, TR); }
  else { g(-3, -4 + (step > 0 ? 1 : 0), 2.6, 4 - (step > 0 ? 1 : 0), TR); g(0.6, -4 + (step < 0 ? 1 : 0), 2.6, 4 - (step < 0 ? 1 : 0), TR); }
  // torso
  g(-4, -11, 8, 7, A); g(-4, -5.4, 8, 1.4, '#2b2b2b'); g(-4.6, -11, 2, 3, TR);
  // pauldrons at Lv.20+
  if (lvl >= 20) { g(-5.6, -11.8, 3, 2.6, gild ? '#ffd76a' : '#aab2c0'); g(2.6, -11.8, 3, 2.6, gild ? '#ffd76a' : '#aab2c0'); }
  // head
  g(-3, -17, 7, 6, skin); g(-3, -18.2, 7, 2.4, hair); g(1.6, -15.2, 1.2, 1.2, '#222');
  // halo crown at Lv.30+
  if (lvl >= 30) { g(-2, -21.4, 5, 1.2, '#ffd76a'); g(-2, -22.6, 1.2, 1.4, '#ffd76a'); g(0.2, -23, 1.2, 1.8, '#ffd76a'); g(2, -22.6, 1.2, 1.4, '#ffd76a'); }
  const k = o.cls.key;
  if (k === 'knight') { g(-3.4, -18.8, 7.8, 1.6, '#9aa4b4'); g(3.4, -18.4, 1.2, 3, '#c33'); }
  if (k === 'wizard' || k === 'archmage') { g(-4, -19, 9, 1.6, A); g(-1.4, -22.6, 4, 4, A); g(2, -20.6, 1.2, 1.2, '#ffd76a'); }
  if (k === 'ranger') { g(-3.4, -18.8, 7.8, 2.2, '#2c5a2c'); }
  if (k === 'rogue') { g(-3.6, -18.6, 8, 3.4, '#26262e'); g(1.6, -15.2, 1.4, 1.2, '#e33'); }
  if (k === 'bard') { g(-3.4, -18.8, 7.8, 1.6, '#733048'); g(3, -20.4, 1, 2.4, '#ffd76a'); }
  if (k === 'paladin') { g(-3.4, -18.8, 7.8, 1.6, '#b9a44c'); }
  if (k === 'artificer') { g(-3.2, -16.4, 6.4, 1.4, '#c9a227'); }
  if (k === 'dragoon') { g(-3.4, -18.8, 7.8, 1.6, '#2e6d6d'); g(-3.6, -20.6, 1.4, 2.4, '#bcd'); g(2.4, -20.6, 1.4, 2.4, '#bcd'); }
  if (k === 'sage') { g(0.4, -15.6, 2.6, 1.8, '#dcd6ff'); }
  // arm + weapon
  const swing = o.pose === 'victory' ? 0.62 : (o.attackT != null ? Math.sin(clamp(o.attackT, 0, 1) * Math.PI) : 0);
  c.save();
  c.translate(3 * S, (-9 + kneel) * S - hop);
  c.rotate((-100 * swing + 15) * Math.PI / 180);
  px(c, 0, 0, -0.6, -1, 2, 4.5, skin);
  const BL = gild ? '#ffe08a' : '#dfe7f2', BL2 = gild ? '#ffd76a' : '#cfd8e6';
  const w = { knight: 'sword', paladin: 'hammer', ranger: 'bow', rogue: 'dagger', wizard: 'staff', archmage: 'staff', sage: 'tome', artificer: 'wrench', bard: 'lute', dragoon: 'spear' }[k] || 'sword';
  if (w === 'sword') { px(c, 0, 0, -0.2, -8.6, 1.4, 8, BL); px(c, 0, 0, -1.4, -1.4, 3.8, 1.2, '#c9a227'); }

  if (w === 'hammer') { px(c, 0, 0, 0, -7.4, 1.2, 7, '#8a6a3a'); px(c, 0, 0, -1.8, -9, 4.8, 2.6, gild ? '#ffd76a' : '#aab2c0'); }

  if (w === 'bow') { c.strokeStyle = '#8a6a3a'; c.lineWidth = S; c.beginPath(); c.arc(0, -3 * S, 7.4 * S, -1.15, 1.15); c.stroke(); c.strokeStyle = gild ? '#ffd76a' : '#ddd'; c.lineWidth = 1; c.beginPath(); c.moveTo(2.6 * S, -9.6 * S); c.lineTo(2.6 * S, 3 * S); c.stroke(); }
  if (w === 'lute') { px(c, 0, 0, -1, -5.4, 3, 4, '#a06a3a'); px(c, 0, 0, -0.2, -8.4, 1.2, 3.4, '#7a4a22'); }
  c.restore();
  c.restore();
}

// monster. o: {kind,t,hit,taunt,boss,dyingK,lunge}
function paintMonster(c, mx, my, o) {
  c.save(); c.translate(mx, my);
  if (o.lunge != null && o.lunge < 1) c.translate(-Math.sin(o.lunge * Math.PI) * 16, 0);
  const sc = (o.boss ? 1.5 : 1) * (o.dyingK != null ? Math.max(0.05, 1 - o.dyingK) : 1);
  if (o.dyingK != null) c.globalAlpha = Math.max(0, 1 - o.dyingK * 1.1);
  c.scale(sc, sc);
  const bounce = Math.sin(o.t / (o.kind === 'golem' ? 420 : 240)) * (o.kind === 'slime' ? 3 : 1.6) - (o.taunt ? 2.4 : 0);
  const flash = (o.hit && (performance.now() - o.hit) < 110) || (o.dyingK != null && o.dyingK < 0.14);
  const F = col => flash ? '#ffffff' : col;
  c.fillStyle = 'rgba(0,0,0,0.3)'; c.beginPath(); c.ellipse(0, 2, o.kind === 'dragon' ? 34 : o.kind === 'golem' ? 26 : 18, 4, 0, 0, 7); c.fill();
  const g = (x, y, w, h, col) => px(c, 0, bounce, x, y, w, h, F(col));
  if (o.kind === 'slime') {
    const sq = 1 + Math.sin(o.t / 240) * 0.12;
    c.save(); c.scale(sq, 2 - sq);
    px(c, 0, 0, -6, -7, 12, 7, F('#4caf50')); px(c, 0, 0, -5, -8.4, 10, 2, F('#66c96a'));
    px(c, 0, 0, -3, -5.4, 1.6, 2, '#fff'); px(c, 0, 0, 1.6, -5.4, 1.6, 2, '#fff');
    px(c, 0, 0, -2.6, -4.8, 1, 1.2, '#123'); px(c, 0, 0, 2, -4.8, 1, 1.2, '#123');
    c.restore();
  } else if (o.kind === 'goblin') {
    g(-4, -4, 3, 4, '#4c6a2c'); g(1, -4, 3, 4, '#4c6a2c');
    g(-5, -12, 10, 8, '#6a8f3c'); g(-4, -18, 8, 6, '#7ba24a');
    g(-6.4, -17, 2, 3, '#7ba24a'); g(4.4, -17, 2, 3, '#7ba24a');
    g(-2.4, -16, 1.4, 1.4, '#ffdf6a'); g(1.4, -16, 1.4, 1.4, '#ffdf6a');
    g(4.6, -13, 2, 7, '#7a5a34'); g(4, -15, 3.2, 2.6, '#8a6a3a');
  } else if (o.kind === 'golem') {
    g(-5, -5, 4, 5, '#6f6f76'); g(1, -5, 4, 5, '#6f6f76');
    g(-8, -15, 16, 10, '#8d8d93'); g(-6, -21, 12, 6, '#9d9da3');
    g(-9.6, -14, 3, 8, '#7d7d83'); g(6.6, -14, 3, 8, '#7d7d83');
    g(-3.4, -19, 2, 2, '#ff9d2e'); g(1.6, -19, 2, 2, '#ff9d2e');
    g(-6, -12, 4, 1.4, '#6a6a70'); g(2, -9, 4, 1.4, '#6a6a70');
  } else { // dragon
    const wing = Math.sin(o.t / 180) * 5;
    c.fillStyle = F('#8e2b20');
    c.beginPath(); c.moveTo(-4 * S, -14 * S); c.lineTo(-16 * S, (-20 - wing) * S); c.lineTo(-7 * S, -8 * S); c.fill();
    c.beginPath(); c.moveTo(4 * S, -14 * S); c.lineTo(16 * S, (-20 + wing) * S); c.lineTo(7 * S, -8 * S); c.fill();
    g(-9, -12, 18, 9, '#b03a2e'); g(-12.6, -8.6, 4, 3, '#b03a2e');
    g(5, -18, 8, 7, '#c1483a');
    g(11.4, -16.4, 3, 2, '#ffd76a');
    g(6.4, -19.8, 1.6, 2.4, '#e8dcc0'); g(9.4, -19.8, 1.6, 2.4, '#e8dcc0');
    g(7.4, -15.6, 1.6, 1.6, '#ffdf3a');
    g(-4, -3.6, 4, 3.6, '#8e2b20'); g(1, -3.6, 4, 3.6, '#8e2b20');

function paintDeco(c, d, now) {

    c.fillStyle = '#6d4c2f'; c.fillRect(x - 3, y - 12, 7, 13);
    c.fillStyle = '#2f6d3a'; c.beginPath(); c.arc(x, y - 22, 15, 0, 7); c.fill();
    c.fillStyle = '#3f8f4d'; c.beginPath(); c.arc(x - 5, y - 26, 9, 0, 7); c.fill();
  } else if (d.t === 'rock') {
    c.fillStyle = '#8d8d93'; c.beginPath(); c.arc(x, y - 4, 7, 0, 7); c.fill();
    c.fillStyle = '#9d9da3'; c.fillRect(x - 4, y - 9, 5, 3);
  } else if (d.t === 'flower') {
    c.fillStyle = '#3f8f4d'; c.fillRect(x, y - 4, 2, 5);
    c.fillStyle = ['#ffd76a', '#ff8a9a', '#c77dff'][Math.floor((d.x * 7 + d.y) % 3)]; c.fillRect(x - 2, y - 8, 6, 5);
    c.fillStyle = '#fff'; c.fillRect(x, y - 6, 2, 2);
  } else if (d.t === 'torch') {
    c.fillStyle = '#6d4c2f'; c.fillRect(x - 2, y - 16, 4, 17);
    const f = Math.sin(now / 90 + d.x * 3) * 2;
    c.fillStyle = '#ff9d2e'; c.beginPath(); c.arc(x, y - 19 + f * 0.4, 5, 0, 7); c.fill();
    c.fillStyle = '#ffdf3a'; c.beginPath(); c.arc(x, y - 20 + f * 0.4, 2.6, 0, 7); c.fill();

    c.fillStyle = '#ffdf3a'; c.beginPath(); c.arc(x, y - 9 - f * 0.4, 3.4, 0, 7); c.fill();

    c.fillStyle = '#8a6a3a'; c.fillRect(x - 18, y - 30, 36, 18);
    c.strokeStyle = '#4a3a18'; c.strokeRect(x - 18, y - 30, 36, 18);
    c.fillStyle = '#e8dcc0'; c.fillRect(x - 13, y - 27, 9, 11); c.fillRect(x + 2, y - 26, 9, 9);
    c.fillStyle = '#a33'; c.fillRect(x - 12, y - 26, 3, 2); c.fillRect(x + 3, y - 25, 3, 2);
    c.fillStyle = '#ffd76a'; c.font = 'bold 9px monospace'; c.textAlign = 'center'; c.fillText('QUESTS', x, y - 32); c.textAlign = 'left';
  } else if (d.t === 'barrel') {

    c.fillStyle = '#6d4c2f'; c.fillRect(x - 6, y - 9, 12, 2); c.fillRect(x - 6, y - 4, 12, 2);

    setTarget: null, holdUntil: 0, victoryUntil: 0, flinch: 0, chat: null,
    attackStart: 0, autoNext: performance.now() + 1500 + Math.random() * 1500,
    tokens: 0, gold: 0, lvl: 1, xp: 0, quest: '', activity: '', waiting: false, ping: 0,
    wkey: null, bucket: 'rest',
    stats: { strikes: 0, dmg: 0, crits: 0, misses: 0 }, // battle stats since this view opened
  };
}

const siteOwner = new Array(SITES.length).fill(null);   // wkey
const restOwner = new Array(REST_SPOTS.length).fill(null);
const boardOwner = new Array(BOARD_SPOTS.length).fill(null);
const dummyOwner = new Array(DUMMY_SPOTS.length).fill(null);
function claim(arr, id) { let i = arr.indexOf(id); if (i >= 0) return i; i = arr.indexOf(null); if (i >= 0) arr[i] = id; return i; }
function release(arr, id) { const i = arr.indexOf(id); if (i >= 0) arr[i] = null; }

function spawnMonster(party) {
  const tier = monsterTier(party.sumTokens);
  const adj = pick(MONSTER_ADJ[tier.kind]);
  const hp = Math.round(tier.hp * (1 + 0.4 * Math.max(0, party.members.length - 1)));
  party.monster = { kind: tier.kind, label: tier.label, name: `the ${adj} ${party.proj} ${tier.label}`, hp, maxHp: hp, t0: performance.now(), hit: 0, taunt: false, isBoss: false, dying: 0, lungeAt: 0 };
}

function partyVictory(party) {
  if (!party.monster || party.monster.dying) return;
  const now = performance.now();
  party.monster.dying = now;
  party.victoryAt = now;
  const st = SITES[party.site];
  if (st) {
    const mx = (st.x + 1.3) * TILE, my = st.y * TILE;
    burst(mx, my - 24, '#fff', 26, 1.8); burst(mx, my - 24, '#ffd76a', 20, 1.4);
    coinShower(mx - TILE, my);
    textFloat(mx - TILE, my - 66, 'VICTORY!', '#ffd76a', true, 1900);
  }
  blog(`🏆 ${party.monster.name} is defeated! The «${party.proj}» party celebrates!`);
  SFX.fanfare();
  for (const id of party.members) {
    const h = heroes.get(id);
    if (h) { h.holdUntil = now + 1800; h.victoryUntil = now + 1800; textFloat(h.x, h.y - 78, `+${Math.round(h.gold)}g`, '#ffd76a', false, 1500); }
  }
}

function syncHeroes(list) {
  const now = performance.now();
  const prio = s => s.needsAttention ? 0 : (['working', 'thinking', 'starting'].includes(s.state) ? 0 : 2);
  const shown = [...list].sort((a, b) => prio(a) - prio(b) || new Date(b.lastActivity) - new Date(a.lastActivity)).slice(0, 16);
  const present = new Set(shown.map(s => s.sessionId));

  // departures
  for (const [id, h] of heroes) {
    if (!present.has(id)) {
      blog(`${h.name} departs the guild…`);
      release(restOwner, id); release(boardOwner, id); release(dummyOwner, id);
      heroes.delete(id);
      lastSessions.delete(id);
    }
  }

  // pass 1: upsert heroes + buckets
  for (const s of shown) {
    let h = heroes.get(s.sessionId);
    const isNew = !h;
    if (isNew) { h = makeHero(s); heroes.set(s.sessionId, h); blog(`⚔ ${s.name || 'A hero'} the ${classOf(s.customRole || s.role).title} joins the guild!`); }
    h.name = s.name || h.name;
    h.cls = classOf(s.customRole || s.role);
    h.color = (s.persona && s.persona.color) || h.color;
    h.tokens = (s.tokens && s.tokens.total) || 0;
    h.gold = (s.labor && s.labor.cost) || 0;
    const wasLvl = h.lvl;
    h.lvl = levelOf(h.tokens); h.xp = xpProgress(h.tokens);
    if (!isNew && h.lvl > wasLvl) {
      blog(`✨ ${h.name} reached Lv.${h.lvl}!${h.lvl === 10 ? ' A cape is bestowed!' : h.lvl === 20 ? ' Golden arms earned!' : h.lvl === 30 ? ' A crown of mastery!' : ''}`);
      burst(h.x, h.y - 30, '#ffd76a', 24, 1.4);
      textFloat(h.x, h.y - 80, 'LEVEL UP!', '#ffd76a', true, 1500);
      SFX.levelup();
    }
    h.quest = s.task || projName(s);
    h.activity = s.activity || '';
    h.wkey = wkeyOf(s);
    h.proj = projName(s);
    lastSessions.set(s.sessionId, s);
    const active = ['working', 'thinking', 'starting'].includes(s.state);
    const wasWaiting = h.waiting;
    h.waiting = !!s.needsAttention;
    if (h.waiting && !wasWaiting) { blog(`⚠ ${h.name} calls for their master!`); SFX.alert(); }
    h.bucket = h.waiting ? 'wait' : active ? 'fight' : 'rest';
  }

  // pass 2: desired parties (any hero fighting or waiting keeps its workspace engaged)
  const want = new Map();
  for (const h of heroes.values()) {
    if (h.bucket === 'rest') continue;
    let p = want.get(h.wkey);
    if (!p) { p = { members: [], proj: h.proj, hasActive: false }; want.set(h.wkey, p); }
    p.members.push(h);
    if (h.bucket === 'fight') p.hasActive = true;
  }

  // pass 3: retire parties that no longer have engaged members -> victory sequence
  for (const [key, party] of parties) {
    if (!want.has(key) && party.monster && !party.monster.dying) partyVictory(party);
  }

  // pass 4: reconcile wanted parties
  for (const [key, w] of want) {
    let party = parties.get(key);
    if (!party) { party = { key, proj: w.proj, site: null, monster: null, members: [], sumTokens: 0, counterNext: now + 5000, victoryAt: 0 }; parties.set(key, party); }
    if (party.monster && party.monster.dying) continue; // let the old fight finish dying before re-engaging
    party.proj = w.proj;
    // strongest hero fights at the front
    w.members.sort((a, b) => b.tokens - a.tokens);
    party.members = w.members.map(h => h.id);
    party.sumTokens = w.members.reduce((a, h) => a + h.tokens, 0);
    // claim a battle site
    if (party.site == null) {
      const si = claim(siteOwner, key);
      party.site = si >= 0 ? si : null;
    }
    if (party.site != null) {
      if (!party.monster) {
        spawnMonster(party);
        const m = party.monster;
        blog(w.members.length > 1
          ? `⚔ Party «${party.proj}» (${w.members.length} heroes) engages ${m.name}!`
          : `${w.members[0].name} embarks: «${String(w.members[0].quest).slice(0, 40)}» — ${m.name} appears!`);
      }
      party.monster.taunt = !w.hasActive; // everyone waiting -> the monster mocks them
      const st = SITES[party.site];
      w.members.forEach((h, i) => {
        const [fx, fy] = FORM[Math.min(i, FORM.length - 1)];
        release(restOwner, h.id); release(boardOwner, h.id); release(dummyOwner, h.id);
        h.setTarget = { x: (st.x + fx) * TILE, y: (st.y + fy) * TILE, mode: h.bucket === 'wait' ? 'waitSite' : 'fight' };
      });
    } else {
      // no free site: waiting heroes gather at the board, active ones train at dummies
      for (const h of w.members) {
        release(restOwner, h.id);
        if (h.bucket === 'wait') {
          const b = claim(boardOwner, h.id);
          const [bx, by] = b >= 0 ? BOARD_SPOTS[b] : [13, 12];
          h.setTarget = { x: bx * TILE, y: by * TILE, mode: 'waitBoard' };
        } else {
          const di = claim(dummyOwner, h.id);
          const [dx, dy] = di >= 0 ? DUMMY_SPOTS[di] : [19 + Math.random() * 6, 16];
          h.setTarget = { x: dx * TILE, y: dy * TILE, mode: 'train' };
        }
      }
    }
  }

  // pass 5: resting heroes head to the inn
  for (const h of heroes.values()) {
    if (h.bucket !== 'rest') continue;
    release(boardOwner, h.id); release(dummyOwner, h.id);
    if (['rest'].includes(h.mode) || (h.nextMode === 'rest' && h.mode === 'walk')) continue; // already there / en route
    if (h.mode === 'fight' && !parties.get(h.wkey)) blog(`🏆 ${h.name} banks quest progress (+${Math.round(h.gold)}g)`);
    const ri = claim(restOwner, h.id);
    const [rx, ry] = ri >= 0 ? REST_SPOTS[ri] : [17 + Math.random() * 10, 11.4];
    h.setTarget = { x: rx * TILE, y: ry * TILE, mode: 'rest' };
  }

  // pass 6: elect the world boss (largest hoard, must be worth the title)
  let top = null;
  for (const p of parties.values()) if (p.monster && !p.monster.dying) { if (!top || p.sumTokens > top.sumTokens) top = p; }
  for (const p of parties.values()) {
    if (!p.monster) continue;
    const was = p.monster.isBoss;
    p.monster.isBoss = (p === top && p.sumTokens >= 2e7);
    if (p.monster.isBoss && !was) { blog(`☠ A WORLD BOSS emerges: ${p.monster.name}! (${fmt(p.sumTokens)} tokens strong)`); SFX.boss(); }
  }

  updateHUD(list);
  updateQuestPanel();

  // deep link (/?agent=<id>): once that hero exists, ping them and open their sheet
  if (pendingAgent && heroes.has(pendingAgent)) {
    const h = heroes.get(pendingAgent);
    h.ping = performance.now();
    openHeroSheet(pendingAgent);
    pendingAgent = null;
  }
}

// battle actions from live tool events
const TOOL_FLAVOR = [
  [/edit|write|notebook/, [
    (h, m) => `${h.name} strikes ${m} with the Refactor Blade`,
    (h, m) => `${h.name} lands a Clean-Code Combo on ${m}`,
    (h, m) => `${h.name} slashes ${m} with a hotfix`,
  ]],
  [/bash|shell|powershell/, [
    (h, m) => `${h.name} casts Terminal Incantation at ${m}`,
    (h, m) => `${h.name} channels sudo lightning at ${m}`,
    (h, m) => `${h.name} pipes raw shell magic into ${m}`,
  ]],
  [/read/, [
    (h) => `${h.name} studies the ancient scrolls…`,
    (h) => `${h.name} deciphers forbidden documentation…`,
  ]],
  [/grep|glob|search/, [
    (h) => `${h.name} scours the dungeon archives…`,
    (h) => `${h.name} tracks the beast through the codebase…`,
  ]],
  [/task|agent/, [
    (h) => `${h.name} summons an apprentice!`,
    (h) => `${h.name} calls in reinforcements!`,
  ]],
  [/webfetch|websearch|fetch/, [
    (h) => `${h.name} consults the Oracle`,
    (h) => `${h.name} scries distant realms for answers`,
  ]],
  [/todo/, [(h) => `${h.name} updates the quest journal`]],
];
function battleAction(sessionId, tool) {
  const h = heroes.get(sessionId);
  if (!h) return;
  h.attackStart = performance.now();
  const party = parties.get(h.wkey);
  const m = party && party.monster && !party.monster.dying ? party.monster : null;
  const mName = m ? m.name : 'the training dummy';
  const heavy = /edit|write|bash|shell|powershell|notebook/i.test(tool || '');
  const magic = /bash|shell|powershell|webfetch|websearch|fetch/i.test(tool || '');

  // 8% comedy miss on heavy swings
  if (heavy && Math.random() < 0.08) {
    h.stats.misses++;
    blog(pick([
      `${h.name}'s attack misses! ${mName} snickers.`,
      `${h.name} swings mightily… and hits a tree.`,
    ]));
    textFloat(h.x + TILE, h.y - 50, 'MISS', '#8a94a8', false, 900);
    SFX.miss();
    return;
  }

  const dmg = Math.round((heavy ? 600 : 150) + Math.random() * (heavy ? 2600 : 700));
  const crit = Math.random() < 0.1;
  h.stats.strikes++;
  h.stats.dmg += crit ? dmg * 2 : dmg;
  if (crit) h.stats.crits++;
  const fl = TOOL_FLAVOR.find(([re]) => re.test((tool || '').toLowerCase()));
  let line = fl ? pick(fl[1])(h, mName) : `${h.name} attacks ${mName}`;
  if (heavy || !fl) line += ` — ${dmg}${crit ? ' CRIT' : ''} dmg!`;
  blog(line);
  if (magic) SFX.magic(); else SFX.attack(crit);
  if (m && party.site != null) {
    m.hp = Math.max(m.maxHp * 0.06, m.hp - (crit ? dmg * 2 : dmg));
    m.hit = performance.now();
    const st = SITES[party.site];
    dmgFloat((st.x + 1.3) * TILE, st.y * TILE, dmg, crit);
    burst((st.x + 1.3) * TILE, st.y * TILE - 24, crit ? '#ffd76a' : '#fff', crit ? 16 : 8, 1.2);
  } else {
    dmgFloat(h.x + TILE, h.y - 6, dmg, crit);
  }
}

// ---------- HUD + quest panel ----------
function updateHUD(list) {
  let gold = 0, mana = 0, quests = 0;
  for (const s of list) {
    gold += (s.labor && s.labor.cost) || 0;
    mana += (s.tokens && s.tokens.total) || 0;
    if (['working', 'thinking', 'starting'].includes(s.state) || s.needsAttention) quests++;
  }
  document.getElementById('h-gold').textContent = Math.round(gold).toLocaleString() + 'g';
  document.getElementById('h-mana').textContent = fmt(mana);
  document.getElementById('h-heroes').textContent = heroes.size;
  document.getElementById('h-quests').textContent = quests;
}
function updateQuestPanel() {
  const el = document.getElementById('questList');
  const rows = [...heroes.values()].sort((a, b) => (a.waiting ? -1 : a.bucket === 'fight' ? 0 : 1) - (b.waiting ? -1 : b.bucket === 'fight' ? 0 : 1));
  el.innerHTML = rows.map(h => {
    const party = parties.get(h.wkey);
    const boss = party && party.monster && party.monster.isBoss && h.bucket !== 'rest';
    const st = h.waiting ? ['wait', '⏳ needs you!'] : boss ? ['boss', '☠ world boss!'] : (h.bucket === 'fight') ? ['fight', '⚔ on quest'] : ['rest', '🍺 at the inn'];
    const partyTag = party && party.members.length > 1 && h.bucket !== 'rest' ? ` <span style="color:#7fdc7f">(party of ${party.members.length})</span>` : '';
    return `<div class="qrow ${boss ? 'boss' : ''}" data-id="${esc(h.id)}">
      <div class="qh"><div class="qemb" style="background:${h.color}">${h.cls.icon}</div>
        <div style="min-width:0"><div class="qname">${esc(h.name)} <span style="color:#c9a227">Lv.${h.lvl}</span></div>
        <div class="qsub">${h.cls.title}${h.lvl >= 30 ? ' 👑' : h.lvl >= 20 ? ' ✨' : h.lvl >= 10 ? ' 🎗' : ''}${partyTag}</div></div></div>
      <div class="qquest" title="${esc(h.quest)}">📜 ${esc(String(h.quest).slice(0, 46))}</div>
      <div class="qxp"><i style="width:${Math.round(h.xp * 100)}%"></i></div>
      <div class="qfoot"><span class="qstate ${st[0]}">${st[1]}</span><span class="qgold">${Math.round(h.gold)}g</span></div>
    </div>`;
  }).join('') || '<div style="color:#8a7a56;font-size:12px;text-align:center;padding:20px">No heroes in the guild yet…</div>';
  el.querySelectorAll('.qrow').forEach(r => {
    r.onclick = () => {
      const h = heroes.get(r.dataset.id);
      if (h) h.ping = performance.now();
      openHeroSheet(r.dataset.id);
    };
  });
}

// ---------- inn chatter ----------
setInterval(() => {
  const resting = [...heroes.values()].filter(h => h.mode === 'rest' && !h.chat);
  if (!resting.length || Math.random() < 0.35) return;
  const h = pick(resting);
  h.chat = { text: pick(CHATTER), until: performance.now() + 3800 };
}, 6500);

// ---------- main loop ----------
let last = performance.now();
function tick(now) {
  const dt = Math.min(50, now - last); last = now;

  // party upkeep: dying cleanup + monster counterattacks
  for (const [key, party] of parties) {
    const m = party.monster;
    if (m && m.dying && now - m.dying > 1400) {
      release(siteOwner, key);
      parties.delete(key);
      continue;
    }
    if (m && !m.dying && now > party.counterNext) {
      party.counterNext = now + 4500 + Math.random() * 4500;
      const fighters = party.members.map(id => heroes.get(id)).filter(h => h && h.mode === 'fight');
      if (fighters.length) {
        m.lungeAt = now;
        const t = pick(fighters);
        t.flinch = now;
        const cdmg = Math.round(10 + Math.random() * 70);
        textFloat(t.x, t.y - 56, '-' + cdmg, '#ff8a9a', false, 800);
        SFX.hurt();
      }
    }
  }

  // hero movement + auto-attacks
  for (const h of heroes.values()) {
    const held = h.holdUntil > now;
    if (h.setTarget && !held) {
      h.tx = h.setTarget.x; h.ty = h.setTarget.y; h.nextMode = h.setTarget.mode; h.setTarget = null;
      if (dist(h.x, h.y, h.tx, h.ty) > 4) h.mode = 'walk';
      else h.mode = h.nextMode;
    }
    if (held) { /* victory pose: stand ground */ }
    else if (h.mode === 'walk') {
      const d = dist(h.x, h.y, h.tx, h.ty), sp = 0.09 * dt;
      if (d <= sp) { h.x = h.tx; h.y = h.ty; h.mode = h.nextMode || 'rest'; }
      else { h.facing = h.tx >= h.x ? 1 : -1; h.x += (h.tx - h.x) / d * sp; h.y += (h.ty - h.y) / d * sp; }
    } else if (h.mode === 'fight' || h.mode === 'train') {
      h.facing = 1;
      if (now > h.autoNext) {
        h.attackStart = now; h.autoNext = now + 1400 + Math.random() * 1400;
        const party = parties.get(h.wkey);
        if (party && party.monster && !party.monster.dying) { party.monster.hit = now; party.monster.hp = Math.max(party.monster.maxHp * 0.06, party.monster.hp - (40 + Math.random() * 220)); }
      }
    }
  }
  for (const p of parties.values()) if (p.monster && !p.monster.dying) p.monster.hp = Math.min(p.monster.maxHp, p.monster.hp + dt * 0.02);

  // ---- draw ----
  ctx.drawImage(base, 0, 0);
  for (let y = 19; y <= 24; y++) for (let x = 3; x <= 9; x++) if (grid[y][x] === T.WATER) {
    const px0 = x * TILE, py0 = y * TILE;
    ctx.fillStyle = '#2f6db8'; ctx.fillRect(px0, py0, TILE, TILE);
    ctx.fillStyle = 'rgba(102,183,255,0.55)';
    const ph = (x * 13 + y * 7);
    ctx.fillRect(px0 + 4 + Math.sin(now / 600 + ph) * 3, py0 + 8, 10, 2);
    ctx.fillRect(px0 + 14 + Math.cos(now / 700 + ph) * 3, py0 + 22, 8, 2);
  }

  const items = [];
  for (const d of deco) items.push({ y: d.y * TILE, draw: () => paintDeco(ctx, d, now) });
  for (const h of heroes.values()) items.push({ y: h.y, draw: () => drawHero(h, now) });
  for (const p of parties.values()) {
    if (p.monster && p.site != null) {
      const st = SITES[p.site];
      items.push({ y: st.y * TILE + 1, draw: () => drawMonster(p, st, now) });
    }
  }
  items.sort((a, b) => a.y - b.y);
  for (const it of items) it.draw();

  // particles
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i]; p.age += dt;
    if (p.age > p.life) { parts.splice(i, 1); continue; }
    p.x += p.vx * dt * 0.06; p.y += p.vy * dt * 0.06; p.vy += 0.002 * dt;
    ctx.globalAlpha = 1 - p.age / p.life;
    ctx.fillStyle = p.col; ctx.fillRect(p.x, p.y, p.sz, p.sz);
    ctx.globalAlpha = 1;
  }
  ctx.textAlign = 'center';
  for (let i = floats.length - 1; i >= 0; i--) {
    const f = floats[i]; f.age += dt;
    if (f.age > f.life) { floats.splice(i, 1); continue; }
    const k = f.age / f.life;
    ctx.globalAlpha = 1 - k * k;
    ctx.font = `bold ${f.big ? 20 : 14}px monospace`;
    ctx.fillStyle = '#000'; ctx.fillText(f.text, f.x + 1, f.y - k * 34 + 1);
    ctx.fillStyle = f.col; ctx.fillText(f.text, f.x, f.y - k * 34);
    ctx.globalAlpha = 1;
  }
  ctx.textAlign = 'left';

  drawBossBanner(now);

  const hr = new Date().getHours();
  if (hr >= 20 || hr < 6) { ctx.fillStyle = 'rgba(12,16,48,0.34)'; ctx.fillRect(0, 0, WORLD_W, WORLD_H); }
  else if (hr >= 17) { ctx.fillStyle = 'rgba(48,24,32,0.16)'; ctx.fillRect(0, 0, WORLD_W, WORLD_H); }

  requestAnimationFrame(tick);
}

function drawBossBanner(now) {
  let boss = null;
  for (const p of parties.values()) if (p.monster && p.monster.isBoss && !p.monster.dying) { boss = p; break; }
  if (!boss) return;
  const m = boss.monster;
  const w = 470, x = (WORLD_W - w) / 2, y = 8;
  ctx.fillStyle = 'rgba(10,6,4,0.82)'; ctx.fillRect(x, y, w, 40);
  ctx.strokeStyle = '#a03030'; ctx.lineWidth = 2; ctx.strokeRect(x, y, w, 40);
  ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center';
  const pulse = 0.7 + Math.sin(now / 300) * 0.3;
  ctx.fillStyle = `rgba(255,138,154,${pulse})`;
  ctx.fillText('☠ WORLD BOSS ☠', x + w / 2, y + 14);
  ctx.fillStyle = '#e8dcc0'; ctx.font = '11px monospace';
  ctx.fillText(m.name, x + w / 2, y + 27);
  ctx.fillStyle = '#241c10'; ctx.fillRect(x + 12, y + 32, w - 24, 4);
  ctx.fillStyle = '#e3455a'; ctx.fillRect(x + 12, y + 32, (w - 24) * clamp(m.hp / m.maxHp, 0, 1), 4);
  ctx.textAlign = 'left';
}

function drawHero(h, now) {
  const attackT = h.attackStart ? clamp((now - h.attackStart) / 320, 0, 1) : null;
  const flinchX = h.flinch && now - h.flinch < 220 ? -Math.sin((now - h.flinch) / 220 * Math.PI) * 5 : 0;
  const victory = h.victoryUntil > now;
  paintHero(ctx, h.x + flinchX, h.y, {
    cls: h.cls, color: h.color, lvl: h.lvl, facing: h.facing,
    walk: h.mode === 'walk' && h.holdUntil <= now, t: now,
    kneel: h.waiting && h.mode !== 'walk' && !victory,
    pose: victory ? 'victory' : null,
    attackT: !victory && attackT != null && attackT < 1 ? attackT : null,
  });
  // Lv.30+ golden aura sparkles
  if (h.lvl >= 30 && Math.random() < 0.06) {
    parts.push({ x: h.x + (Math.random() * 30 - 15), y: h.y - Math.random() * 46, vx: 0, vy: -0.25, life: 700, age: 0, col: '#ffd76a', sz: 2 });
  }
  ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center';
  const label = `${h.name} Lv.${h.lvl}`;
  const w = ctx.measureText(label).width + 10;
  ctx.fillStyle = 'rgba(0,0,0,0.62)';
  ctx.fillRect(h.x - w / 2, h.y - 74, w, 13);
  ctx.fillStyle = h.color; ctx.fillText(h.name, h.x - 14, h.y - 64);
  ctx.fillStyle = '#ffd76a'; ctx.fillText(`Lv.${h.lvl}`, h.x + w / 2 - 18, h.y - 64);
  ctx.textAlign = 'left';
  ctx.fillStyle = '#241c10'; ctx.fillRect(h.x - w / 2, h.y - 61, w, 2);
  ctx.fillStyle = '#ffd76a'; ctx.fillRect(h.x - w / 2, h.y - 61, w * h.xp, 2);
  if (h.waiting && !victory) {
    const b = Math.abs(Math.sin(now / 260)) * 5;
    ctx.fillStyle = '#ffd76a'; ctx.fillRect(h.x - 5, h.y - 96 - b, 10, 14);
    ctx.fillStyle = '#1a1408'; ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center';
    ctx.fillText('!', h.x, h.y - 85 - b); ctx.textAlign = 'left';
  }
  if (h.mode === 'rest' && Math.floor(now / 900) % 3 === 0 && !h.chat) {
    ctx.fillStyle = 'rgba(232,220,192,0.8)'; ctx.font = '10px monospace';
    ctx.fillText('z', h.x + 12, h.y - 70 - (now % 900) / 90);
  }
  if (h.ping && now - h.ping < 2200) {
    const k = ((now - h.ping) % 700) / 700;
    ctx.strokeStyle = `rgba(255,215,106,${1 - k})`; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(h.x, h.y - 24, 12 + k * 26, 0, 7); ctx.stroke();
  }
  // speech bubbles: inn chatter, or current activity while fighting
  let bubble = null;
  if (h.chat) { if (h.chat.until > now) bubble = h.chat.text; else h.chat = null; }
  else if ((h.mode === 'fight' || h.mode === 'train') && h.activity && Math.floor(now / 5200) % 3 === 0) bubble = h.activity.slice(0, 26);
  if (bubble) {
    ctx.font = '9px monospace';
    const bw = ctx.measureText(bubble).width + 10;
    ctx.fillStyle = 'rgba(20,16,10,0.85)';
    ctx.fillRect(h.x - bw / 2, h.y - 92, bw, 13);
    ctx.strokeStyle = '#6b5220'; ctx.strokeRect(h.x - bw / 2, h.y - 92, bw, 13);
    ctx.fillStyle = '#e8dcc0'; ctx.textAlign = 'center'; ctx.fillText(bubble, h.x, h.y - 82); ctx.textAlign = 'left';
  }
}

function drawMonster(party, st, now) {
  const m = party.monster;
  const mx = (st.x + 1.3) * TILE, my = st.y * TILE;
  const dyingK = m.dying ? clamp((now - m.dying) / 1200, 0, 1) : null;
  const lunge = m.lungeAt && now - m.lungeAt < 420 ? (now - m.lungeAt) / 420 : null;
  paintMonster(ctx, mx, my, { kind: m.kind, t: now - m.t0, hit: m.hit, taunt: m.taunt, boss: m.isBoss, dyingK, lunge });
  if (dyingK != null) return; // no hp/name while evaporating
  const bw = m.isBoss ? 84 : 62;
  const topY = m.isBoss ? my - 108 : my - 78;
  ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(mx - bw / 2, topY, bw, 5);
  ctx.fillStyle = '#e3455a'; ctx.fillRect(mx - bw / 2 + 1, topY + 1, (bw - 2) * clamp(m.hp / m.maxHp, 0, 1), 3);
  ctx.font = '9px monospace'; ctx.textAlign = 'center';
  const nm = (m.isBoss ? '☠ ' : '') + (m.name.length > 26 ? m.name.slice(0, 25) + '…' : m.name);
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(mx - ctx.measureText(nm).width / 2 - 4, topY - 14, ctx.measureText(nm).width + 8, 12);
  ctx.fillStyle = m.isBoss ? '#ff8a9a' : '#ffb3b3'; ctx.fillText(nm, mx, topY - 5);
  ctx.textAlign = 'left';
  if (m.taunt) {
    const b = Math.abs(Math.sin(now / 300)) * 4;
    ctx.fillStyle = '#ff8a9a'; ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center';
    ctx.fillText('?', mx + 18, topY + 16 - b); ctx.textAlign = 'left';
  }
}

// ---------- WebSocket ----------
(function() {
  if (location.protocol === 'file:') return;
  const wsUrl = `ws://${location.hostname}:${location.port || 3456}`;
  let ws;
  function connect() {
    ws = new WebSocket(wsUrl);
    ws.onmessage = (e) => {
      try {
        const ev = JSON.parse(e.data);
        if (ev.type === 'sessions') syncHeroes(ev.sessions || []);
        else if (ev.type === 'tool_start') battleAction(ev.sessionId, ev.tool);
      } catch {}
    };
    ws.onclose = () => setTimeout(connect, 2000);
    ws.onerror = () => ws.close();
  }
  connect();
  fetch('/sessions').then(r => r.json()).then(syncHeroes).catch(() => {});
})();

// ---------- hero character sheet ----------
// Click a hero (on the map or in the quest log) -> RPG status screen with the
// real work summary + performance: quest, last words, career stats, skill
// usage (tool breakdown), and how they've waited on their master.
let respRows = [];
function refreshResponses() {
  fetch('/responses').then(r => r.json()).then(rows => { if (Array.isArray(rows)) respRows = rows; }).catch(() => {});
}
refreshResponses();
setInterval(refreshResponses, 60000);

const sheetOverlay = document.getElementById('sheetOverlay');
const sheetBody = document.getElementById('sheetBody');
let openHeroId = null;

function durS(ms) {
  const s = Math.max(0, Math.round((+ms || 0) / 1000));
  if (s >= 3600) return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm';
  if (s >= 60) return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
  return s + 's';
}
const TOOL_ICONS = [
  [/edit|write|notebook/i, '⚔'], [/bash|shell|powershell/i, '🔮'], [/read/i, '📖'],
  [/grep|glob|search/i, '🔍'], [/task|agent/i, '🧙'], [/webfetch|websearch|fetch/i, '🔭'], [/todo/i, '📜'],
];
function toolIcon(name) { const f = TOOL_ICONS.find(([re]) => re.test(name)); return f ? f[1] : '🛠'; }

function openHeroSheet(id) {
  openHeroId = id;
  renderHeroSheet();
  sheetOverlay.classList.add('open');
}
function closeHeroSheet() { openHeroId = null; sheetOverlay.classList.remove('open'); }
sheetOverlay.addEventListener('click', (e) => { if (e.target === sheetOverlay) closeHeroSheet(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeHeroSheet(); });

function renderHeroSheet() {
  const h = heroes.get(openHeroId);
  if (!h) { closeHeroSheet(); return; }
  const s = lastSessions.get(openHeroId) || {};
  const party = parties.get(h.wkey);
  const m = party && party.monster && !party.monster.dying ? party.monster : null;

  // state line
  const stateTxt = h.waiting ? '⏳ Kneeling — calls for their master!'
    : h.mode === 'fight' && m ? `⚔ Battling ${m.name} (${Math.round((m.hp / m.maxHp) * 100)}% HP)${m.isBoss ? ' ☠ WORLD BOSS' : ''}`
    : h.mode === 'train' ? '🎯 Training at the dummies'
    : h.mode === 'walk' ? '🚶 On the road'
    : '🍺 Resting at the inn';
  const partyTxt = party && party.members.length > 1 ? ` · party of ${party.members.length}` : '';

  // master calls (response history for this hero)
  const mine = respRows.filter(r => r.sessionId === openHeroId);
  const answered = mine.filter(r => ['reply', 'resumed', 'focus'].includes(r.via));
  const ignored = mine.length - answered.length;
  const medWait = answered.length
    ? answered.map(r => r.waitedMs).sort((a, b) => a - b)[Math.floor(answered.length / 2)]
    : null;

  // skills from the real tool breakdown
  const skills = Object.entries(s.toolBreakdown || {}).sort((a, b) => b[1] - a[1]).slice(0, 5);
  const maxSkill = skills.length ? skills[0][1] : 1;

  const tok = s.tokens || {};
  const critRate = h.stats.strikes ? Math.round((h.stats.crits / h.stats.strikes) * 100) : 0;

  // preserve last-words scroll across live re-renders
  const prevLast = sheetBody.querySelector('.slast');
  const lastScroll = prevLast ? prevLast.scrollTop : 0;

  sheetBody.innerHTML = `
    <div class="sheet-head">
      <div class="sheet-emb" style="background:${h.color}">${h.cls.icon}</div>
      <div>
        <div class="sheet-name">${esc(h.name)} <span style="color:#c9a227">Lv.${h.lvl}</span></div>
        <div class="sheet-sub">${h.cls.title}${h.lvl >= 30 ? ' 👑' : h.lvl >= 20 ? ' ✨' : h.lvl >= 10 ? ' 🎗' : ''} · ${esc(s.model || 'unknown')} · ${esc(s.ide || '?')}${s.source === 'cowork' ? ' · 🤝 cowork' : ''}</div>
      </div>
      <button class="sheet-close" onclick="closeHeroSheet()">×</button>
    </div>
    <div class="sheet-xp" title="XP to next level"><i style="width:${Math.round(h.xp * 100)}%"></i></div>

    <h4>📜 Current quest</h4>
    <div class="squest">
      ${esc(String(h.quest || '—'))}
      <div class="dim" style="margin-top:6px">🏰 ${esc(s.title || h.proj)} · ${stateTxt}${partyTxt}</div>
      ${s.activity ? `<div class="dim">⚡ ${esc(s.activity)}</div>` : ''}
      ${s.cwd ? `<div class="dim" style="opacity:.7">📂 ${esc(s.cwd)}</div>` : ''}
    </div>

    ${s.lastMessage ? `<h4>💬 Last words</h4><div class="slast">${esc(s.lastMessage)}</div>` : ''}

    <h4>📈 Career</h4>
    <div class="sgrid">
      <div class="sstat"><div class="v">${Math.round(h.gold).toLocaleString()}g</div><div class="l">Gold (labor)</div></div>
      <div class="sstat"><div class="v">${fmt(tok.total || 0)}</div><div class="l">Mana (tokens)</div></div>
      <div class="sstat"><div class="v">$${(s.cost || 0).toFixed(2)}</div><div class="l">API cost</div></div>
      <div class="sstat"><div class="v">${((s.activeMs || 0) / 3600000).toFixed(1)}h</div><div class="l">Active work</div></div>
      <div class="sstat"><div class="v">${s.messages || 0}</div><div class="l">Messages</div></div>
      <div class="sstat"><div class="v">${s.toolCount || 0}</div><div class="l">Tool strikes</div></div>
      <div class="sstat"><div class="v">${s.startTime ? durS(Date.now() - new Date(s.startTime)) : '—'}</div><div class="l">Uptime</div></div>
      <div class="sstat"><div class="v">${fmt(h.stats.dmg)}</div><div class="l">Dmg (this view)</div></div>
      <div class="sstat"><div class="v">${critRate}% / ${h.stats.misses}</div><div class="l">Crit rate / misses</div></div>
    </div>

    ${skills.length ? `<h4>🎯 Skills</h4>` + skills.map(([name, n]) =>
      `<div class="skillbar" title="${esc(name)}"><span class="sn">${toolIcon(name)} ${esc(name.split('__').pop())}</span><span class="sb" style="width:${Math.round((n / maxSkill) * 200) + 4}px"></span><span class="sv">×${n}</span></div>`
    ).join('') : ''}

    <h4>🙋 Master calls</h4>
    <div class="squest">${mine.length
      ? `Answered <b style="color:#7fdc7f">${answered.length}</b> · Ignored <b style="color:${ignored ? '#ff8a9a' : '#b7a476'}">${ignored}</b>${medWait != null ? ` · Median wait <b style="color:#ffd76a">${durS(medWait)}</b>` : ''}${h.waiting && h.mode !== 'walk' ? ' · <b style="color:#ffcf5a">waiting right now!</b>' : ''}`
      : 'No calls recorded yet — stats appear once this hero waits for you.'}</div>

    <div class="sheet-actions">
      <span class="rpg-btn" id="sheetFocus">⤢ Summon window</span>
      <span class="rpg-btn" id="sheetFolder">📂 Open lair</span>
      <span class="sheet-status" id="sheetStatus"></span>
    </div>`;

  const newLast = sheetBody.querySelector('.slast');
  if (newLast) newLast.scrollTop = lastScroll;
  const status = (msg, ok) => { const el = document.getElementById('sheetStatus'); if (el) { el.textContent = msg; el.className = 'sheet-status ' + (ok ? 'ok' : 'err'); } };
  document.getElementById('sheetFocus').onclick = () => {
    status('Summoning…', true);
    fetch('/focus', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sessionId: openHeroId }) })
      .then(r => r.json()).then(d => status(d.ok ? 'Window summoned.' : `Couldn't: ${d.reason || d.result || 'unknown'}`, d.ok))
      .catch(() => status('Summon failed.', false));
  };
  document.getElementById('sheetFolder').onclick = () => {
    fetch('/open-folder', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sessionId: openHeroId }) })
      .then(r => r.json()).then(d => status(d.ok ? 'Lair opened.' : `Couldn't: ${d.reason || 'error'}`, d.ok))
      .catch(() => status('Open failed.', false));
  };
}
// keep the sheet live while open (uptime ticks, battle stats, state changes)
setInterval(() => { if (openHeroId && sheetOverlay.classList.contains('open')) renderHeroSheet(); }, 1500);

// click a hero on the map -> open their sheet (hover shows a pointer)
function heroAtPoint(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  if (!r.width) return null;
  const x = (clientX - r.left) * (WORLD_W / r.width);
  const y = (clientY - r.top) * (WORLD_H / r.height);
  let best = null, bd = Infinity;
  for (const h of heroes.values()) {
    if (x > h.x - 26 && x < h.x + 26 && y > h.y - 80 && y < h.y + 8) {
      const d = Math.hypot(x - h.x, y - (h.y - 32));
      if (d < bd) { bd = d; best = h; }
    }
  }
  return best;
}
canvas.addEventListener('click', (e) => {
  const h = heroAtPoint(e.clientX, e.clientY);
  if (h) { h.ping = performance.now(); openHeroSheet(h.id); }
});
canvas.addEventListener('mousemove', (e) => {
  canvas.style.cursor = heroAtPoint(e.clientX, e.clientY) ? 'pointer' : 'default';
});

// ---------- chrome: splash, toggles, embedded nav ----------
const splash = document.getElementById('splash');
function dismissSplash() { splash.classList.add('gone'); }
splash.addEventListener('click', dismissSplash);
setTimeout(dismissSplash, 3200);

const crtBtn = document.getElementById('crtBtn');
function paintCrt() { crtBtn.classList.toggle('toggled', localStorage.getItem('aihq-crt') === '1'); document.body.classList.toggle('scanlines', localStorage.getItem('aihq-crt') === '1'); }
crtBtn.onclick = () => { localStorage.setItem('aihq-crt', localStorage.getItem('aihq-crt') === '1' ? '0' : '1'); paintCrt(); };
paintCrt();

const sfxBtn = document.getElementById('sfxBtn');
function paintSfx() { sfxBtn.classList.toggle('toggled', SFX.on); sfxBtn.textContent = SFX.on ? '🔊 SFX' : '🔇 SFX'; }
sfxBtn.onclick = () => { SFX.toggle(); paintSfx(); };
paintSfx();

(function() {
  window.addEventListener('message', (e) => {
    if (e.origin !== location.origin || !e.data || typeof e.data !== 'object') return;
    if (e.data.type === 'highlight-agent') {
      const h = heroes.get(e.data.id);
      if (h) { h.ping = performance.now(); openHeroSheet(e.data.id); }
      else pendingAgent = e.data.id; // hero not synced yet — open once it appears
    }
  });
  if (window.parent === window) return;
  const MAP = { '/dashboard': 'panel', '/history': 'history' };
  document.querySelectorAll('a.rpg-btn[href]').forEach(a => {
    const view = MAP[a.getAttribute('href')];
    if (!view) return;
    a.addEventListener('click', (e) => { e.preventDefault(); parent.postMessage({ type: 'nav', view }, location.origin); });
  });
})();

resize();
requestAnimationFrame(tick);
</script>
